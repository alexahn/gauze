mutation CursorDeleteYtitne(
	$cursor: String
	$source: Ytitne_Mutation__Source
	$where: Ytitne_Mutation__Where
	$where_in: Ytitne_Mutation__Where_Array
	$cache_where_in: Ytitne_Mutation__Where_String
	$where_not_in: Ytitne_Mutation__Where_Array
	$cache_where_not_in: Ytitne_Mutation__Where_String
	$where_like: Ytitne_Mutation__Where
	$where_between: Ytitne_Mutation__Where_Array
	$limit: Int
	$order: [Order]
) {
	cursor_delete_ytitne(
		cursor: $cursor
		source: $source
		where: $where
		where_in: $where_in
		cache_where_in: $cache_where_in
		where_not_in: $where_not_in
		cache_where_not_in: $cache_where_not_in
		where_like: $where_like
		where_between: $where_between
		limit: $limit
		order: $order
	) {
		nodes {
			attributes {
				id
				created_at
				updated_at
				deleted_at
				text
			}
		}
		page_info {
			has_previous_page
			has_next_page
			previous_cursor
			current_cursor
			next_cursor
		}
	}
}
