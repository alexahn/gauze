mutation CursorDeleteBlacklist(
	$cursor: String
	$where: Blacklist_Mutation__Where
	$where_in: Blacklist_Mutation__Where_Array
	$cache_where_in: Blacklist_Mutation__Where_String
	$where_not_in: Blacklist_Mutation__Where_Array
	$cache_where_not_in: Blacklist_Mutation__Where_String
	$where_like: Blacklist_Mutation__Where
	$where_between: Blacklist_Mutation__Where_Array
	$limit: Int
	$order: [Order]
) {
	cursor_delete_blacklist(
		cursor: $cursor
		where: $where
		where_in: $where_in
		cache_where_in: $cache_where_in
		where_not_in: $where_not_in
		cache_where_not_in: $cache_where_not_in
		where_like: $where_like
		where_between: $where_between
		limit: $limit
		order: $order
	) {
		nodes {
			attributes {
				gauze__blacklist__id
				gauze__blacklist__created_at
				gauze__blacklist__updated_at
				gauze__blacklist__deleted_at
				gauze__blacklist__realm
				gauze__blacklist__agent_role
				gauze__blacklist__agent_id
				gauze__blacklist__agent_type
				gauze__blacklist__entity_id
				gauze__blacklist__entity_type
				gauze__blacklist__method
			}
		}
		page_info {
			has_previous_page
			has_next_page
			previous_cursor
			current_cursor
			next_cursor
		}
	}
}
