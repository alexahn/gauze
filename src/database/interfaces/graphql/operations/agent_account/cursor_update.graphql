mutation CursorUpdateAgent_Account(
	$cursor: String
	$source: Agent_Account_Mutation__Source
	$attributes: Agent_Account_Mutation__Attributes
	$where: Agent_Account_Mutation__Where
	$where_in: Agent_Account_Mutation__Where_Array
	$cache_where_in: Agent_Account_Mutation__Where_String
	$where_not_in: Agent_Account_Mutation__Where_Array
	$cache_where_not_in: Agent_Account_Mutation__Where_String
	$where_like: Agent_Account_Mutation__Where
	$where_between: Agent_Account_Mutation__Where_Array
	$limit: Int
	$order: [Order]
) {
	cursor_update_agent_account(
		cursor: $cursor
		source: $source
		attributes: $attributes
		where: $where
		where_in: $where_in
		cache_where_in: $cache_where_in
		where_not_in: $where_not_in
		cache_where_not_in: $cache_where_not_in
		where_like: $where_like
		where_between: $where_between
		limit: $limit
		order: $order
	) {
		nodes {
			attributes {
				gauze__agent_account__id
				gauze__agent_account__created_at
				gauze__agent_account__updated_at
				gauze__agent_account__deleted_at
				gauze__agent_account__password
			}
		}
		page_info {
			has_previous_page
			has_next_page
			previous_cursor
			current_cursor
			next_cursor
		}
	}
}
