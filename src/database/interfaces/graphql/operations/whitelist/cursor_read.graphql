query CursorReadWhitelist(
	$cursor: String
	$where: Whitelist_Query__Where
	$where_in: Whitelist_Query__Where_Array
	$cache_where_in: Whitelist_Query__Where_String
	$where_not_in: Whitelist_Query__Where_Array
	$cache_where_not_in: Whitelist_Query__Where_String
	$where_like: Whitelist_Query__Where
	$where_between: Whitelist_Query__Where_Array
	$limit: Int
	$order: [Order]
) {
	cursor_read_whitelist(
		cursor: $cursor
		where: $where
		where_in: $where_in
		cache_where_in: $cache_where_in
		where_not_in: $where_not_in
		cache_where_not_in: $cache_where_not_in
		where_like: $where_like
		where_between: $where_between
		limit: $limit
		order: $order
	) {
		nodes {
			attributes {
				gauze__whitelist__id
				gauze__whitelist__created_at
				gauze__whitelist__updated_at
				gauze__whitelist__deleted_at
				gauze__whitelist__realm
				gauze__whitelist__agent_role
				gauze__whitelist__agent_id
				gauze__whitelist__agent_type
				gauze__whitelist__entity_id
				gauze__whitelist__entity_type
				gauze__whitelist__method
			}
		}
		page_info {
			has_previous_page
			has_next_page
			previous_cursor
			current_cursor
			next_cursor
		}
	}
}
